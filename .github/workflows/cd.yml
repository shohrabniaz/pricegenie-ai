name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run ci

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy."
            echo "See docs/DEPLOYMENT.md to configure Vercel CD."
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npm install -g vercel@latest
          deploy_url=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes 2>&1 | tail -1)
          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "## Production deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $deploy_url" >> "$GITHUB_STEP_SUMMARY"
