version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
      dev-tools:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "eslint*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
